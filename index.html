<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
                
    </head>
    <body   >
        <div class="container" >
            <div class="innerContainer">
                <h3 class="teams">HOME</h3>
                <p class="score" id="HOME">0</p>
                <div class="btn-container">
                    <button class="count-btn" id="home-btn-1">+1</button>
                    <button class="count-btn" id="home-btn-2">+2</button>
                    <button class="count-btn" id="home-btn-3">+3</button>
                </div>
                
            </div>
            <div class="innerContainer">
                <h3 class="teams">AWAY</h3>
                <p class="score" id="GUEST">0</p>
                <div class="btn-container">
                    <button class="count-btn" id="guest-btn-1">+1</button>
                    <button class="count-btn" id="guest-btn-2">+2</button>
                    <button class="count-btn" id="guest-btn-3">+3</button>
                </div>
            </div>
        </div>
        <div class="reset-container">
            <button class="count-btn" id="reset-btn">Reset</button>
        </div>
        <script src="./script/index.js"></script>
    </body>
</html>
